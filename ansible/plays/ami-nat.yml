- name: Configure NAT instance with AMI setup
  hosts: ssm_nat
  gather_facts: false
  become: true

  pre_tasks:
    - name: Wait for stable SSM connection
      wait_for_connection:
        timeout: 300
        sleep: 10
        connect_timeout: 20
      register: conn
      retries: 5
      delay: 10
      until: conn is succeeded

    - name: Get default network interface
      ansible.builtin.shell: ip route | awk '/default/ {print $5; exit}'
      register: nat_interface
      changed_when: false
      retries: 5
      delay: 5
      until: nat_interface is succeeded

    - name: Install iptables persistence package
      ansible.builtin.dnf:
        name: iptables-services
        state: present
        update_cache: yes
      register: dnf_result
      retries: 5 
      delay: 10
      until: dnf_result is succeeded 
    

    - name: Enable and start iptables service
      ansible.builtin.service:
        name: iptables
        enabled: true
        state: started
      register: ip_service_result
      retries: 5
      delay: 10
      until: ip_service_result is succeeded

  tasks:
    - name: Enable IPv4 forwarding persistently
      ansible.builtin.copy:
        dest: /etc/sysctl.d/99-nat.conf
        content: |
          net.ipv4.ip_forward=1
        owner: root
        group: root
        mode: "0644"

    - name: Apply sysctl settings
      ansible.builtin.command: sysctl --system
      changed_when: false

    - name: Check for default FORWARD reject rule
      ansible.builtin.command: >
        iptables -C FORWARD -j REJECT --reject-with icmp-host-prohibited
      register: forward_reject_check
      changed_when: false
      failed_when: forward_reject_check.rc not in [0, 1]

    - name: Remove default FORWARD reject rule if present
      ansible.builtin.command: >
        iptables -D FORWARD -j REJECT --reject-with icmp-host-prohibited
      when: forward_reject_check.rc == 0
      register: remove_forward_reject

    - name: Check MASQUERADE rule
      ansible.builtin.command: >
        iptables -t nat -C POSTROUTING -o {{ nat_interface.stdout }} -j MASQUERADE
      register: masquerade_check
      changed_when: false
      failed_when: masquerade_check.rc not in [0, 1]

    - name: Add MASQUERADE rule if missing
      ansible.builtin.command: >
        iptables -t nat -A POSTROUTING -o {{ nat_interface.stdout }} -j MASQUERADE
      when: masquerade_check.rc == 1
      register: add_masquerade

    - name: Check FORWARD established rule
      ansible.builtin.command: >
        iptables -C FORWARD -i {{ nat_interface.stdout }} -o {{ nat_interface.stdout }}
        -m state --state RELATED,ESTABLISHED -j ACCEPT
      register: forward_established_check
      changed_when: false
      failed_when: forward_established_check.rc not in [0, 1]

    - name: Insert FORWARD established rule at top if missing
      ansible.builtin.command: >
        iptables -I FORWARD 1 -i {{ nat_interface.stdout }} -o {{ nat_interface.stdout }}
        -m state --state RELATED,ESTABLISHED -j ACCEPT
      when: forward_established_check.rc == 1
      register: add_forward_established

    - name: Check FORWARD rule
      ansible.builtin.command: >
        iptables -C FORWARD -i {{ nat_interface.stdout }} -o {{ nat_interface.stdout }} -j ACCEPT
      register: forward_check
      changed_when: false
      failed_when: forward_check.rc not in [0, 1]

    - name: Insert FORWARD rule at top if missing
      ansible.builtin.command: >
        iptables -I FORWARD 1 -i {{ nat_interface.stdout }} -o {{ nat_interface.stdout }} -j ACCEPT
      when: forward_check.rc == 1
      register: add_forward

    - name: Save iptables rules
      ansible.builtin.command: service iptables save
      when: >
        (remove_forward_reject is changed) or
        (add_masquerade is changed) or
        (add_forward_established is changed) or
        (add_forward is changed)

    - name: Verify IP forwarding is enabled
      ansible.builtin.command: sysctl net.ipv4.ip_forward
      register: ip_forward_check
      changed_when: false

    - name: Assert IP forwarding is enabled
      ansible.builtin.assert:
        that:
          - "'net.ipv4.ip_forward = 1' in ip_forward_check.stdout"
        fail_msg: "IP forwarding is NOT enabled"

    - name: Check MASQUERADE rule exists
      ansible.builtin.command: iptables -t nat -L -n
      register: nat_table
      changed_when: false

    - name: Assert MASQUERADE rule exists
      ansible.builtin.assert:
        that:
          - "'MASQUERADE' in nat_table.stdout"
        fail_msg: "MASQUERADE rule not found"

    - name: Check FORWARD chain
      ansible.builtin.command: iptables -L FORWARD -n
      register: forward_table
      changed_when: false

    - name: Assert FORWARD reject rule is gone
      ansible.builtin.assert:
        that:
          - "'reject-with icmp-host-prohibited' not in forward_table.stdout"
        fail_msg: "Default FORWARD reject rule is still present"