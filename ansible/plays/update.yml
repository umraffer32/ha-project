- name: Update and Upgrade
  hosts: ssm_hosts,ssm_nat
  become: true
  gather_facts: false

  tasks:
    - name: Wait for stable SSM connection
      wait_for_connection:
        timeout: 300
        sleep: 10
        connect_timeout: 20
      register: conn
      retries: 5
      delay: 10
      until: conn is succeeded

    - name: Update apt cache and upgrade packages
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600
        upgrade: dist
      register: apt_result
      retries: 5
      delay: 10
      until: apt_result is succeeded  

    - name: Install locales-all
      ansible.builtin.apt:
        name: locales-all
        state: present

    - name: Ensure en_US.UTF-8 locale exists
      ansible.builtin.locale_gen:
        name: en_US.UTF-8
        state: present
